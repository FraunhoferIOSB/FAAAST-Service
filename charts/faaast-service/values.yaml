# values.yaml
# With minimal configuration, the FA³ST Service runs on port 443 with a self-signed certificate.

image:
  repository: fraunhoferiosb/faaast-service
  tag: 1.3.0
  pullPolicy: IfNotPresent

fullnameOverride: faaast-service

debug:
  enabled: false
  port: 5500
  suspendOnStart: true

autoscaling:
  enabled: false
serviceAccount:
  # Specifies whether a service account should be created
  create: false

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: "localhost"
      paths:
        - path: /
          pathType: Prefix
          servicePort: 443
