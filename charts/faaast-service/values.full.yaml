# values.minimal.yaml

image:
  repository: ghcr.io/factory-x-contributions/fa3st-service
  tag: 0.2.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  name: https

fullnameOverride: faaast-service

autoscaling:
  enabled: false
serviceAccount:
  # Specifies whether a service account should be created
  create: false

ingress:
  enabled: true
  className: "nginx"
  tls:
    - hosts: []
      secretName: ""
  hosts: []
#    - host: ""
#      paths:
#        - path: /
#          pathType: Prefix

# An example to mount an external AAS model into the deployment
